name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            apache2-dev \
            libmarkdown2-dev \
            autoconf \
            automake \
            libtool

      - name: Generate configure
        run: autoreconf -fi

      - name: Configure
        run: ./configure --with-apxs=/usr/bin/apxs2

      - name: Build
        run: make
